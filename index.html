const StatusBadge = ({ status }) => {
  const m = { Comply:{bg:"#E8F5E9",c:C.green,b:"#A5D6A7"}, "In Progress":{bg:"#FFF8E1",c:C.amber,b:"#FFE082"}, Unassigned:{bg:C.gray100,c:C.gray600,b:C.gray300} };
  const s = m[status] || m.Unassigned;
  return <span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{status}</span>;
};

const PriorityBadge = ({ priority }) => {
  const m = { High:{bg:"#FFEBEE",c:C.red,b:"#FFCDD2",p:"P1"}, Medium:{bg:"#FFF3E0",c:"#E65100",b:"#FFCC80",p:"P2"}, Low:{bg:"#E3F2FD",c:C.blue,b:"#BBDEFB",p:"P3"} };
  const s = m[priority] || m.Low;
  return <span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.p} {priority}</span>;
};

const TagBadge = ({ tag }) => {
  const m = { New:{bg:"#E8F5E9",c:C.green}, Active:{bg:"#E3F2FD",c:C.blue} };
  const s = m[tag] || {bg:C.gray100,c:C.gray600};
  return <span style={{background:s.bg,color:s.c,borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:600,marginRight:4}}>{tag}</span>;
};

const Card = ({ children, style={} }) => (

const SortIcon = () => <span style={{color:C.gray400,fontSize:10,marginLeft:3}}>⇅</span>;

const DonutChart = ({ rate, color, size=90 }) => {
  const r = 36, circ = 2*Math.PI*r;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg viewBox="0 0 90 90" style={{transform:"rotate(-90deg)",width:size,height:size}}>
        <circle cx="45" cy="45" r={r} fill="none" stroke={C.gray200} strokeWidth="10"/>
        <circle cx="45" cy="45" r={r} fill="none" stroke={color} strokeWidth="10"
          strokeDasharray={`${circ*rate/100} ${circ*(1-rate/100)}`} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:18,fontWeight:800,color:C.gray800}}>{rate}%</span>
        <span style={{fontSize:9,color:C.gray500}}>Comply</span>
      </div>
    </div>
  );
};

                    {["Aktifkan","Inaktifkan","Konfirmasi Pembaruan"].map(opt=>(
                      <div key={opt} onClick={()=>setBulkOpen(false)} style={{padding:"8px 14px",fontSize:12,cursor:"pointer",color:C.gray700,borderBottom:`1px solid ${C.gray100}`}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.gray50}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{opt}</div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:C.gray400,fontSize:14}}>🔍</span>
              <input value={searchSector} onChange={e=>setSearchSector(e.target.value)} placeholder="Cari Kode atau Nama Sektor..."
                style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"8px 10px 8px 30px",fontSize:12,outline:"none",color:C.gray700}}/>
            </div>
            <div style={{fontSize:11,color:C.gray500,marginBottom:8}}>{filteredSectors.length} dari {SECTORS.length} data ditampilkan</div>
            <div style={{border:`1px solid ${C.gray200}`,borderRadius:8,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",minWidth:600}}>
                  <thead>
                    <tr style={{background:C.navy}}>
                      {["No","Kode","Nama Sektor","Topik","Sub-topik","Kewajiban","Kewajiban Aktif","Pembaruan Terakhir"].map(h=>(
                        <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:C.white,whiteSpace:"nowrap"}}>
                          {h}{!["No","Pembaruan Terakhir","Kewajiban Aktif"].includes(h)&&<SortIcon/>}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredSectors.map((row,i)=>(
                      <tr key={row.code} onClick={()=>setSelectedSector(row)} style={{cursor:"pointer"}}
                        onMouseEnter={e=>e.currentTarget.style.background="#EBF0FA"}
                        onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.white:C.gray50}>
                        <td style={{padding:"10px 12px",fontSize:12,background:i%2===0?C.white:C.gray50}}>{i+1}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.navyLight,fontWeight:700,background:i%2===0?C.white:C.gray50}}>{row.code}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.gray800,background:i%2===0?C.white:C.gray50}}>{row.name}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.gray800,background:i%2===0?C.white:C.gray50}}>{row.topic}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.gray800,background:i%2===0?C.white:C.gray50}}>{row.subtopic}</td>
                        <td style={{padding:"10px 12px",fontSize:12,fontWeight:600,color:C.navyLight,background:i%2===0?C.white:C.gray50}}>{row.obligation.toLocaleString("id-ID")}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:row.active>0?C.green:C.gray500,fontWeight:row.active>0?700:400,background:i%2===0?C.white:C.gray50}}>{row.active}</td>
                        <td style={{padding:"10px 12px",fontSize:12,color:C.gray600,background:i%2===0?C.white:C.gray50}}>{row.lastUpdate}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:C.gray600}}>Baris per halaman:</span>
                <select style={{border:`1px solid ${C.gray300}`,borderRadius:4,padding:"3px 6px",fontSize:12,color:C.gray700}}>
                  <option>10</option><option>20</option><option>50</option>
                </select>
              </div>
              <div style={{background:C.navy,color:C.white,borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>1</div>
            </div>
          </div>
        )}

        {/* SECTOR BASED - DETAIL */}
        {section==="Sector Based"&&selectedSector&&(
          <div style={{display:"flex",height:"100%",overflow:"hidden"}}>
            {/* Tree */}
            <div style={{flex:1,padding:20,overflow:"auto",borderRight:`1px solid ${C.gray200}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,fontSize:13,flexWrap:"wrap"}}>
                <span style={{color:C.navyLight,cursor:"pointer",fontWeight:600}} onClick={()=>setSelectedSector(null)}>Sector Based</span>
                <span style={{color:C.gray400}}>›</span>
                <span style={{color:C.gray800,fontWeight:600}}>{selectedSector.name}</span>
                <div style={{marginLeft:"auto"}}>
                  <div style={{position:"relative"}}>
                    <button onClick={()=>setBulkOpen(v=>!v)} style={{background:C.navy,color:C.white,border:"none",borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>Bulk Action ▾</button>
                    {bulkOpen&&(
                      <div style={{position:"absolute",right:0,top:"110%",background:C.white,border:`1px solid ${C.gray200}`,borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,0.1)",zIndex:100,minWidth:160}}>
                        {["Aktifkan","Inaktifkan","Konfirmasi Pembaruan"].map(opt=>(
                          <div key={opt} onClick={()=>setBulkOpen(false)} style={{padding:"8px 14px",fontSize:12,cursor:"pointer",color:C.gray700,borderBottom:`1px solid ${C.gray100}`}}
                            onMouseEnter={e=>e.currentTarget.style.background=C.gray50}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>{opt}</div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <input readOnly value={selectedSector.name} style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"7px 10px",fontSize:12,color:C.gray700,background:C.gray50,marginBottom:6}}/>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:C.gray400,fontSize:14}}>🔍</span>
                  <input placeholder="Cari Topik atau Sub-topik..." style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"7px 10px 7px 30px",fontSize:12,outline:"none",color:C.gray700}}/>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input type="checkbox" style={{accentColor:C.navy}}/>
                  <span style={{fontSize:12,color:C.gray600}}>Pilih semua untuk diaktifkan ▾</span>
                </div>
                <button onClick={()=>setExpanded({})} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:C.navyLight,fontWeight:600}}>Tutup Semua</button>
              </div>
              <div style={{border:`1px solid ${C.gray200}`,borderRadius:8,overflow:"hidden"}}>
                {renderTree(SECTOR_TREE[selectedSector.code]||[])}
              </div>
            </div>
            {/* Obligation list */}
            <div style={{width:300,padding:16,overflow:"auto",flexShrink:0,background:C.gray50}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{position:"relative",flex:1,marginRight:8}}>
                  <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:C.gray400,fontSize:13}}>🔍</span>
                  <input placeholder="Cari Kewajiban..." style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"6px 8px 6px 28px",fontSize:11,outline:"none",color:C.gray700}}/>
                </div>
                <button onClick={()=>setFilterOpen(v=>!v)} style={{border:`1px solid ${C.gray300}`,background:filterOpen?"#EBF0FA":C.white,borderRadius:6,padding:"6px 10px",fontSize:11,cursor:"pointer",color:C.gray700,flexShrink:0}}>Filter</button>
              </div>
              <div style={{fontSize:11,color:C.gray500,marginBottom:6}}>Baris per halaman:
                <select style={{border:`1px solid ${C.gray300}`,borderRadius:4,padding:"1px 4px",fontSize:11,color:C.gray700,marginLeft:6}}>
                  <option>10</option><option>20</option>
                </select>
              </div>
              <div style={{border:`1px solid ${C.gray200}`,borderRadius:8,overflow:"hidden",background:C.white}}>
                {COMPLIANCE_LIST.slice(0,5).map((item,i)=>(
                  <div key={item.code} style={{padding:"10px 12px",borderBottom:i<4?`1px solid ${C.gray100}`:"none"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                      <input type="checkbox" style={{accentColor:C.navy}}/>
                      <span style={{fontSize:11,fontWeight:700,color:C.navy}}>{item.code}</span>
                      <TagBadge tag="New"/>
                    </div>
                    <div style={{fontSize:11,color:C.gray600,lineHeight:1.4,paddingLeft:18}}>{item.description.substring(0,90)}...</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* REGULATION BASED */}
        {section==="Regulation Based"&&(
          <div style={{padding:24}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{fontSize:16,fontWeight:700,color:C.gray800,margin:"0 0 4px"}}>Peraturan Yang Diacu</h2>
                <p style={{fontSize:12,color:C.gray500,margin:0}}>Daftar hierarki peraturan yang menjadi dasar hukum kewajiban perusahaan</p>
              </div>
            </div>
            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:C.gray400,fontSize:14}}>🔍</span>
              <input value={searchReg} onChange={e=>{setSearchReg(e.target.value);setRegPage(1);}} placeholder="Cari hierarki peraturan..."
                style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"8px 10px 8px 30px",fontSize:12,outline:"none",color:C.gray700}}/>
            </div>
            <div style={{fontSize:11,color:C.gray500,marginBottom:8}}>Menampilkan {(regPage-1)*ROWS+1}–{Math.min(regPage*ROWS,filteredReg.length)} dari {filteredReg.length} data</div>
            <div style={{border:`1px solid ${C.gray200}`,borderRadius:8,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",minWidth:580}}>
                  <thead>
                    <tr style={{background:C.navy}}>
                      {["No","Hierarki Peraturan","Peraturan","Kewajiban","Kewajiban Aktif","Pembaruan Terakhir"].map(h=>(
                        <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:C.white,whiteSpace:"nowrap"}}>
                          {h}{!["No","Pembaruan Terakhir","Kewajiban Aktif"].includes(h)&&<SortIcon/>}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {pagedReg.map((row,i)=>(
                      <tr key={row.no} style={{background:i%2===0?C.white:C.gray50}}
                        onMouseEnter={e=>e.currentTarget.style.background="#EBF0FA"}
                        onMouseLeave={e=>e.currentTarget.style.background=i%2===0?C.white:C.gray50}>
                        <td style={{padding:"10px 14px",fontSize:12,color:C.gray800}}>{row.no}</td>
                        <td style={{padding:"10px 14px",fontSize:12}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:14}}>📁</span>
                            <span style={{color:C.navyLight,cursor:"pointer",fontWeight:500}}>{row.hierarchy}</span>
                          </div>
                        </td>
                        <td style={{padding:"10px 14px",fontSize:12,fontWeight:row.regulation>0?700:400,color:row.regulation>0?C.navyLight:C.gray500}}>{row.regulation}</td>
                        <td style={{padding:"10px 14px",fontSize:12,fontWeight:row.obligation>0?600:400,color:C.gray800}}>{row.obligation.toLocaleString("id-ID")}</td>
                        <td style={{padding:"10px 14px",fontSize:12,color:row.active>0?C.green:C.gray400,fontWeight:row.active>0?700:400}}>{row.active}</td>
                        <td style={{padding:"10px 14px",fontSize:12,color:C.gray600}}>{row.lastUpdate}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12,flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:C.gray600}}>Baris per halaman:</span>
                <select style={{border:`1px solid ${C.gray300}`,borderRadius:4,padding:"3px 6px",fontSize:12,color:C.gray700}}>
                  <option>5</option><option>10</option><option>20</option>
                </select>
              </div>
              <div style={{display:"flex",gap:6}}>
                {Array.from({length:totalPages},(_,i)=>(
                  <button key={i+1} onClick={()=>setRegPage(i+1)} style={{width:28,height:28,borderRadius:6,border:"none",background:regPage===i+1?C.navy:C.gray200,color:regPage===i+1?C.white:C.gray700,fontSize:12,fontWeight:700,cursor:"pointer"}}>{i+1}</button>
                ))}
                {regPage<totalPages&&<button onClick={()=>setRegPage(p=>p+1)} style={{width:28,height:28,borderRadius:6,border:"none",background:C.gray200,color:C.gray700,fontSize:14,cursor:"pointer"}}>›</button>}
              </div>
            </div>
          </div>
        )}

        {/* OBLIGATION UPDATES */}
        {section==="Obligation Updates"&&(
          <div style={{padding:24}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div>
                <h2 style={{fontSize:16,fontWeight:700,color:C.gray800,margin:"0 0 4px"}}>Pembaruan Kewajiban</h2>
                <p style={{fontSize:12,color:C.gray500,margin:0}}>Kewajiban yang baru ditambahkan atau diperbarui dalam database peraturan</p>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{border:`1px solid ${C.gray300}`,background:C.white,borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer",color:C.gray700}}>📅 Pilih Tanggal</button>
                <button style={{border:`1px solid ${C.gray300}`,background:C.white,borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer",color:C.gray700}}>↓</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
              <div style={{flex:1,position:"relative",minWidth:160}}>
                <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:C.gray400,fontSize:14}}>🔍</span>
                <input value={searchUpd} onChange={e=>setSearchUpd(e.target.value)} placeholder="Cari kewajiban..."
                  style={{width:"100%",border:`1px solid ${C.gray300}`,borderRadius:6,padding:"8px 10px 8px 30px",fontSize:12,outline:"none",color:C.gray700}}/>
              </div>
              <button style={{border:`1px solid ${C.gray300}`,background:C.white,borderRadius:6,padding:"7px 12px",fontSize:12,cursor:"pointer",color:C.gray700}}>⚙ Filter</button>
              <button style={{background:C.navy,color:C.white,border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>Bulk Action ▾</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
              <input type="checkbox" style={{accentColor:C.navy}}/>
              <span style={{fontSize:12,color:C.gray600}}>Pilih semua untuk konfirmasi pembaruan ▾</span>
              <span style={{marginLeft:8,fontSize:11,color:C.gray500}}>| {filteredUpd.length} dari {OBLIGATION_UPDATES.length} data</span>
            </div>
            <div style={{border:`1px solid ${C.gray200}`,borderRadius:8,overflow:"hidden",background:C.white}}>
              {filteredUpd.map((item,i)=>(
                <div key={item.code} style={{padding:"12px 16px",borderBottom:i<filteredUpd.length-1?`1px solid ${C.gray100}`:"none"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.gray50}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                    <input type="checkbox" style={{accentColor:C.navy}}/>
                    <span style={{fontSize:12,fontWeight:700,color:C.navy}}>{item.code}</span>
                    {item.tags.map(t=><TagBadge key={t} tag={t}/>)}
                  </div>
                  <div style={{fontSize:12,color:C.gray700,lineHeight:1.5,paddingLeft:22}}>{item.description}</div>
                </div>
              ))}
              {filteredUpd.length===0&&<div style={{padding:32,textAlign:"center",color:C.gray500,fontSize:13}}>Tidak ada kewajiban yang sesuai dengan pencarian.</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Activity Page ─────────────────────────────────────────────────────────────
const ActivityPage = () => (
  <div style={{padding:32,maxWidth:900,margin:"0 auto"}}>
    <h1 style={{fontSize:22,fontWeight:700,color:C.navy,margin:"0 0 4px"}}>Activity</h1>
    <p style={{fontSize:13,color:C.gray600,margin:"0 0 24px"}}>Riwayat aktivitas pengelolaan peraturan dan kewajiban compliance</p>
    <Card style={{padding:0,overflow:"hidden"}}>
      {ACTIVITY_LOG.map(({user,name,action,target,time,color},i)=>(
        <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 20px",borderBottom:i<ACTIVITY_LOG.length-1?`1px solid ${C.gray100}`:"none"}}
          onMouseEnter={e=>e.currentTarget.style.background=C.gray50}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{width:32,height:32,background:color,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{color:C.white,fontSize:11,fontWeight:700}}>{user}</span>
          </div>
          <div style={{flex:1}}>
            <span style={{fontSize:13,color:C.gray800,lineHeight:1.5}}>
              <strong>{name}</strong> {action} <span style={{color:C.navyLight,fontWeight:600}}>{target}</span>
            </span>
            <div style={{fontSize:11,color:C.gray500,marginTop:2}}>{time}</div>
          </div>
        </div>
      ))}
    </Card>
  </div>
);

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("Home");
  return (
    <div style={{fontFamily:"'Segoe UI',Arial,sans-serif",background:C.gray50,minHeight:"100vh"}}>
      <Navbar page={page} setPage={setPage}/>
      {page==="Home"&&<HomePage setPage={setPage}/>}
      {page==="Compliance"&&<CompliancePage/>}
      {page==="Regulatory Framework"&&<RegulatoryFrameworkPage/>}
      {page==="Activity"&&<ActivityPage/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
